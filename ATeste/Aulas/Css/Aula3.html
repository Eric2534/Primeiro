<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Pedido Pizza</h1>
    <form method="post" action="Teste"
    <br>
    Nome: <input type="text" name="nome">
    <br>
    Email: <input type="email" name="email">
    <br>
    Tamanho: 
    <input type="radio" name="tamanho" value="G"> Grande
    <input type="radio" name="tamanho" value="M"> Media
    <input type="radio" name="tamanho" value="P"> Pequena
    <br>
    Sabor da pizza: <select name="sabor">
        <option>Napolitana</option>
        <option>Chocolate</option>
        <option>Frango</option>
    </select>
    <br>
    Adicionais: <input type="checkbox" name="borda" value="sim"> Borda
        <input type="checkbox" name="Queijo" value="sim"> Queijo
        <br>
        Comentário: <br>
        <textarea name="comentario" rows="3" cols="30"></textarea>
        <br>
        <input type="submit" name="Enviar">
</body>
</html>
